# KB Studio — production stack: Nginx (TLS) -> Caddy -> oauth2-proxy (SSO) -> studio (node) -> MongoDB.
#
# Nginx owns the EC2's public ports 80/443 and proxies this stack through port 7674. `studio` and `auth`
# are reachable only on the internal Docker network, so the trusted identity header can't be spoofed from
# outside. Run from this directory: `docker compose --env-file .env up -d --build`.
#
# MongoDB runs inside this stack and persists in the named `mongo-data` volume.
services:
  studio:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        # Sub-path the app is served under (e.g. /kb-studio). Baked into the UI bundle at build time;
        # leave as "/" for root-hosting. Must match the runtime KB_BASE_PATH below.
        KB_BASE_PATH: ${KB_BASE_PATH:-/}
    environment:
      KB_MULTI_USER: "1"
      KB_BASE_PATH: ${KB_BASE_PATH:-/} # runtime: the server strips this prefix off incoming requests
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017} # the internal KB store
      KB_DB_NAME: ${KB_DB_NAME:-kb_studio}
      KB_ADMINS: ${KB_ADMINS} # admin emails to seed on first boot (the access policy then governs)
      KB_DIR: /app/kb # the YAML seed KB, imported into Mongo on first boot (empty-store only)
    expose:
      - "7674" # internal only — never published to the host
    restart: unless-stopped

  # Internal MongoDB for the KB store. Its named volume survives image/container replacement.
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db # place Docker data on durable EBS storage
    expose:
      - "27017"
    restart: unless-stopped

  auth:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    depends_on:
      - studio
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true # trust X-Forwarded-* from Caddy in front
      - --upstream=http://studio:7674 # proxy authenticated requests to the studio
      - --provider=github # swap to `google` (+ --oidc-issuer-url) for Google Workspace
      # No --github-org restriction: anyone who can sign in becomes a read-only VIEWER by default; an
      # admin grants write scopes from the Admin page. Add --github-org=<org> to restrict who can sign in.
      - --email-domain=* # or lock to your domain, e.g. yourcompany.com
      - --cookie-secure=true
      - --pass-user-headers=true # injects X-Forwarded-Email / X-Forwarded-User to the studio
      - --set-xauthrequest=true
      # Sub-path hosting: oauth2-proxy's own endpoints (sign_in/callback) must live under the app's mount
      # (e.g. /kb-studio/oauth2), else its redirects escape to the domain root. Root hosting → /oauth2.
      - --proxy-prefix=${OAUTH_PROXY_PREFIX:-/oauth2}
      - --cookie-path=${KB_BASE_PATH:-/} # scope the session cookie to the app (the root host has another app)
    environment:
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH_COOKIE_SECRET} # 32 bytes: `openssl rand -base64 32`
      # Callback path must equal proxy-prefix + /callback, on the public host.
      OAUTH2_PROXY_REDIRECT_URL: https://${KB_HOST}${OAUTH_PROXY_PREFIX:-/oauth2}/callback
    expose:
      - "4180"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - auth
    ports:
      - "7674:80" # Nginx proxies to this application port; host ports 80/443 remain available to Nginx
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  mongo-data:
  caddy-data:
  caddy-config:
